<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Project Nova atom mark">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5fa2"/>
      <stop offset=".5" stop-color="#a36bff"/>
      <stop offset="1" stop-color="#5b9bff"/>
    </linearGradient>
    <radialGradient id="planet" cx="40%" cy="37%" r="70%">
      <stop offset="0" stop-color="#cba0ff"/>
      <stop offset=".55" stop-color="#9b6bff"/>
      <stop offset="1" stop-color="#5a2db0"/>
    </radialGradient>
  </defs>

  <!-- crossed orbital rings (behind) -->
  <g fill="none" stroke="url(#ring)" stroke-width="4.4">
    <ellipse cx="50" cy="50" rx="43" ry="15" transform="rotate(32 50 50)"/>
    <ellipse cx="50" cy="50" rx="43" ry="15" transform="rotate(-32 50 50)"/>
  </g>

  <!-- planet / core -->
  <circle cx="50" cy="50" r="19" fill="url(#planet)"/>
  <ellipse cx="44" cy="43" rx="7" ry="5" fill="#ffffff" opacity=".22"/>

  <!-- electrons on the orbits -->
  <circle cx="86.5" cy="27.2" r="3.4" fill="#ff5fa2"/>
  <circle cx="13.5" cy="72.8" r="3.4" fill="#5b9bff"/>

  <!-- sparkle accent -->
  <path d="M80 11 C80.7 16.5 82.8 18.6 88 19.3 C82.8 20 80.7 22.1 80 27.6 C79.3 22.1 77.2 20 72 19.3 C77.2 18.6 79.3 16.5 80 11 Z" fill="#ffd76b"/>
</svg>
